[workspace]
resolver = "2"
members = ["crates/shared", "crates/client", "crates/server", "crates/utils"]

[workspace.package]
version = "0.0.1"
edition = "2024"

[profile.release]
opt-level = 3
lto = "thin"
debug = 1
strip = false

[profile.distribution]
inherits = "release"
lto = "fat"
codegen-units = 1
panic = "abort"
strip = true
debug = false

[workspace.dependencies]
time = { version = "0.3.43", features = ["formatting", "macros"] }
tracing = { version = "0.1.41", features = ["release_max_level_warn"] }
tracing-subscriber = { version = "0.3.20", features = [
  "time",
  "local-time",
  "env-filter",
] }
tracy-client = "=0.18.0"
tracing-tracy = "=0.11.4"
wesl = "0.2.0"
image = { version = "0.25.6", default-features = false, features = ["png"] }
bytemuck = { version = "1.13", features = ["derive"] }
offset-allocator = "0.2.0"
bevy = { version = "0.18.1", default-features = false, features = [
  "default_app",
  "default_platform",
  "3d_bevy_render",
  "ui_api",
  "bevy_render",
  "bevy_asset",
  "bevy_state",
] }
rayon = "1.11.0"
futures-lite = "2.6.1"
sysinfo = { version = "0.37.2", default-features = false, features = [
  "system",
] }
derive_more = { version = "2.0.1", features = ["deref", "deref_mut"] }
serde = { version = "1.0.228", features = ["derive"] }
rand = "0.9.2"
ron = "0.11.0"
noise = { version = "0.9.0", default-features = false }
crossbeam = "0.8.4"
glob = "0.3.3"
directories = "6.0"
criterion = { version = "0.5", features = ["html_reports"] }
