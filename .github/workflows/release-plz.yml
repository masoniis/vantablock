name: release-plz

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  # release unpublished packages
  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    outputs:
      releases: ${{ steps.release-plz-step.outputs.releases }}
      releases_created: ${{ steps.release-plz-step.outputs.releases_created }}
    steps:
      - &checkout
        name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - &install-rust
        name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz
        id: release-plz-step
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # create a PR with the new versions and changelog, preparing the next release
  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - *checkout
      - *install-rust
      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # build and upload
  upload-assets:
    needs: [release-plz-release]
    permissions:
      contents: write
    if: ${{ needs.release-plz-release.outputs.releases_created == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            suffix: msi
          - os: macos-latest
            suffix: dmg
          - os: ubuntu-latest
            suffix: deb
    runs-on: ${{ matrix.os }}
    steps:
      - *checkout
      - *install-rust

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev pkg-config libx11-dev libxcursor-dev libxi-dev libxrandr-dev libwayland-dev libxkbcommon-dev libgtk-3-dev

      - name: Install cargo-packager from GitHub
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-packager

      - name: Build and Package
        run: cargo packager -p client --profile distribution

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ fromJSON(needs.release-plz-release.outputs.releases)[0].tag }}
          files: |
            crates/client/target/distribution/packager/*.${{ matrix.suffix }}
            crates/client/target/distribution/packager/*.exe
            crates/client/target/distribution/packager/*.AppImage
            crates/client/target/distribution/packager/*.tar.gz
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
