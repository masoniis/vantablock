name: release-plz

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  # release unpublished packages
  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - &checkout
        name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - &install-rust
        name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # create a PR with the new versions and changelog, preparing the next release
  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - *checkout
      - *install-rust
      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # build and upload
  upload-assets:
    needs: [release-plz-release]
    if: ${{ needs.release-plz.outputs.releases_created == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            suffix: msi
          - os: macos-latest
            suffix: dmg
          - os: ubuntu-latest
            suffix: deb
    runs-on: ${{ matrix.os }}
    steps:
      - *checkout
      - *install-rust

      - name: Get Version from Cargo.toml
        id: get_version
        shell: bash
        run: |
          VERSION=$(grep '^version =' Cargo.toml | head -n 1 | cut -d '"' -f 2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev pkg-config libx11-dev libxcursor-dev libxi-dev libxrandr-dev libwayland-dev libxkbcommon-dev libgtk-3-dev

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked --no-default-features

      - name: Build and Package
        run: cargo packager -p client --profile distribution

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          # Use the tag we just created
          tag_name: v${{ steps.get_version.outputs.version }}
          files: |
            target/distribution/out/*.${{ matrix.suffix }}
            target/distribution/out/*.exe
            target/distribution/out/*.AppImage
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
