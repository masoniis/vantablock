name: release-plz

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  # release unpublished packages
  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    outputs:
      releases: ${{ steps.release-plz-step.outputs.releases }}
      releases_created: ${{ steps.release-plz-step.outputs.releases_created }}
    steps:
      - &checkout
        name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - &install-rust
        name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz
        id: release-plz-step
        uses: release-plz/action@354a50e4d5b33f60f1180798105961513080d1f4 # 4/9/2026
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # create a PR with the new versions and changelog, preparing the next release
  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - *checkout
      - *install-rust
      - name: Run release-plz
        uses: release-plz/action@354a50e4d5b33f60f1180798105961513080d1f4 # 4/9/2026
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # build and upload
  upload-assets:
    needs: [release-plz-release]
    permissions:
      contents: write
    if: ${{ contains(needs.release-plz-release.outputs.releases, '"package_name":"client"') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            suffix: msi
          - os: macos-latest
            suffix: dmg
          - os: ubuntu-latest
            suffix: deb
    runs-on: ${{ matrix.os }}
    steps:
      - *checkout
      - *install-rust

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev pkg-config libx11-dev libxcursor-dev libxi-dev libxrandr-dev libwayland-dev libxkbcommon-dev libgtk-3-dev

      - name: Install cargo-packager from GitHub
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-packager

      - name: Build and Package
        run: |
          cargo build -p client --profile distribution --features distribution
          cargo packager -p client --profile distribution

      - name: Extract Client Release Tag
        id: client_tag
        shell: bash
        run: |
          # extract tag from package_name='client' to append release assets to
          TAG=$(echo '${{ needs.release-plz-release.outputs.releases }}' | jq -r '.[] | select(.package_name == "client") | .tag')
          if [ -z "$TAG" ] || [ "$TAG" == "null" ]; then
            echo "Error: Could not find tag for client package."
            exit 1
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Rename client assets to Vantablock
        shell: bash
        run: |
          cd target/distribution/ || exit 0

          # loop through all files starting with "client" and change to "Vantablock"
          for file in client*; do
            if [[ -f "$file" ]]; then
              mv "$file" "${file/client/Vantablock}"
            fi
          done

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.client_tag.outputs.tag }}
          files: |
            target/distribution/Vantablock*.dmg
            target/distribution/Vantablock*.exe
            target/distribution/Vantablock*.AppImage
            target/distribution/Vantablock*.tar.gz
            target/distribution/Vantablock*.pkg
            target/distribution/Vantablock*.deb
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
