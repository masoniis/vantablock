name: release-cycle

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release

      - name: Checkout PR branch
        if: ${{ steps.release.outputs.pr }}
        uses: actions/checkout@v4
        with:
          ref: ${{ fromJSON(steps.release.outputs.pr).headBranchName }}

      - name: Update Cargo.lock
        if: ${{ steps.release.outputs.pr }}
        run: cargo update --workspace

      - name: Commit and push Cargo.lock
        if: ${{ steps.release.outputs.pr }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock
          git commit -m "chore: update Cargo.lock" || echo "No changes to commit"
          git push

  release-assets:
    needs: [release-please]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: b-linux-x86_64.tar.gz
          - os: macos-latest
            asset_name: b-macos-x86_64.tar.gz
          - os: windows-latest
            asset_name: b-windows-x86_64.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev pkg-config libx11-dev libxcursor-dev libxi-dev libxrandr-dev libwayland-dev libxkbcommon-dev

      - name: Build binary
        run: cargo build --profile distribution --features final_release

      - name: Prepare assets (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir build
          cp target/distribution/b build/
          cp -r assets build/
          cp config.ron readme.md build/
          cd build
          tar -czf ../${{ matrix.asset_name }} *

      - name: Prepare assets (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mkdir build
          copy target\distribution\b.exe build\
          xcopy /E /I assets build\assets
          copy config.ron build\
          copy readme.md build\
          cd build
          powershell Compress-Archive -Path * -DestinationPath ..\${{ matrix.asset_name }}

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: ${{ matrix.asset_name }}
