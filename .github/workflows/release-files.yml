name: release asset files

on:
  push:
    tags:
      - "v*"

jobs:
  upload-assets:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            suffix: msi
          - os: macos-latest
            suffix: dmg
          - os: ubuntu-latest
            suffix: deb
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev pkg-config libx11-dev libxcursor-dev libxi-dev libxrandr-dev libwayland-dev libxkbcommon-dev libgtk-3-dev

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked --no-default-features

      - name: Build and Package
        run: cargo packager -p client --profile distribution

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/distribution/out/*.${{ matrix.suffix }}
            target/distribution/out/*.exe
            target/distribution/out/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
